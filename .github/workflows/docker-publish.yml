name: Build and Publish Docker Images

on:
  push:
    branches: [ "main", "master" ]
    # Ignore changes to documentation and config files that don't affect the build
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
      - 'docker-compose*.yml'
      - 'config/**'
  pull_request:
    branches: [ "main", "master" ]
    paths-ignore:
      - '**.md'
      - 'LICENSE'

env:
  REGISTRY: ghcr.io
  # github.repository as <account>/<repo>
  BACKEND_IMAGE_NAME: ${{ github.repository }}-backend
  FRONTEND_IMAGE_NAME: ${{ github.repository }}-frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha
            type=raw,value=latest

      # 先 load 到本地并做冒烟测试，再推送；避免 GHCR 上出现无法 import app.main 的坏镜像
      - name: Build Backend image (local, for smoke test)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          load: true
          tags: nastool-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test Backend image
        run: |
          docker run --rm nastool-backend:ci \
            python -c "import app.main; print('app.main import OK')"

      - name: Push Backend Docker image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata (tags, labels) for Frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha
            type=raw,value=latest

      - name: Build Frontend image (local, for smoke test)
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.frontend
          push: false
          load: true
          tags: nastool-frontend:ci
          build-args: |
            VITE_API_BASE_URL=http://backend:3001
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test Frontend image
        run: |
          docker run --rm --entrypoint sh nastool-frontend:ci \
            -c 'test -f /usr/share/nginx/html/index.html && echo "frontend static OK"'

      - name: Push Frontend Docker image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.frontend
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          build-args: |
            VITE_API_BASE_URL=http://backend:3001
          cache-from: type=gha
          cache-to: type=gha,mode=max
