services:
  # ---- 后端 API ----
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        # 默认不装 Playwright/Chromium，镜像小；需要浏览器自动化时再设为 1（见 backend/Dockerfile）
        WITH_PLAYWRIGHT_BROWSER: ${WITH_PLAYWRIGHT_BROWSER:-0}
    container_name: nastool-backend
    restart: unless-stopped
    environment:
      - TZ=${TZ:-Asia/Shanghai}
      - API_PORT=${API_PORT:-3001}
      - DEBUG=${DEBUG:-false}
      - DB_TYPE=${DB_TYPE:-sqlite}
      - SQLITE_DB_PATH=/data/db/nastool.db
      - POSTGRESQL_URI=${POSTGRESQL_URI:-}
      - SECRET_KEY=${SECRET_KEY:-}
      - SUPERUSER=${SUPERUSER:-admin}
      - SUPERUSER_PASSWORD=${SUPERUSER_PASSWORD:-password}
      - PROXY_HOST=${PROXY_HOST:-}
      - TMDB_API_KEY=${TMDB_API_KEY:-}
      - QB_HOST=${QB_HOST:-}
      - QB_USERNAME=${QB_USERNAME:-admin}
      - QB_PASSWORD=${QB_PASSWORD:-adminadmin}
      - EMBY_HOST=${EMBY_HOST:-}
      - EMBY_API_KEY=${EMBY_API_KEY:-}
      - JELLYFIN_HOST=${JELLYFIN_HOST:-}
      - JELLYFIN_API_KEY=${JELLYFIN_API_KEY:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - COOKIECLOUD_HOST=${COOKIECLOUD_HOST:-}
      - COOKIECLOUD_KEY=${COOKIECLOUD_KEY:-}
      - COOKIECLOUD_PASSWORD=${COOKIECLOUD_PASSWORD:-}
    ports:
      - "${API_PORT:-3001}:3001"
    volumes:
      # 数据持久化：数据库、日志
      - ${DATA_PATH:-./data}:/data
      # 媒体目录挂载
      - ${DOWNLOAD_PATH:-/tmp/downloads}:/media/downloads
      - ${LIBRARY_PATH:-/tmp/library}:/media/library
      # 可选：宿主机额外配置文件挂载到 /app/config（与包内 app/config 内置站点路径不同）
      - ./config:/app/config:ro
      # 将环境变量文件挂载入容器以便动态保存和热重载
      - ./.env:/app/.env:rw
      # 后端源码请勿在此 bind mount：宿主机 ./backend/app 若不存在会变成空目录，
      # 覆盖镜像内 /app/app 导致 uvicorn 无法 import app.main。
      # 开发热更新请使用: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
    networks:
      - nastool-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/v1/system/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ---- 前端 Web UI ----
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
      args:
        - VITE_API_BASE_URL=http://backend:3001
    container_name: nastool-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - nastool-net
    environment:
      # Nginx 反代后端
      - BACKEND_URL=http://backend:3001

# volumes:
#   nastool-data:
#     driver: local
#     driver_opts:
#       type: none
#       o: bind
#       # 修改此路径为你的实际数据目录
#       device: ${DATA_PATH:-./data}

networks:
  nastool-net:
    driver: bridge
